{% extends "base.html" %}

{% block title %}编辑项目{% endblock %}

{% block breadcrumb %}<span>› <a href="/admin/projects">项目管理</a></span><span>› 编辑</span>{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title"><svg style="width:20px;height:20px;display:inline-block;vertical-align:middle;"><use href="#icon-edit"/></svg> 编辑项目</h2>
    </div>
    
    <form method="post">
        <div class="form-group">
            <label>项目名称</label>
            <input type="text" value="{{ project.project_name }}" disabled style="background: var(--bg);">
        </div>
        
        <div class="form-group">
            <label for="project_url">目标链接</label>
            <input type="url" id="project_url" name="project_url" value="{{ project.project_url or '' }}" placeholder="https://github.com/owner/repo">
        </div>

        <div class="form-group">
            <label for="description">描述</label>
            <textarea id="description" name="description">{{ project.description or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="stars">Stars</label>
            <input type="number" id="stars" name="stars" value="{{ project.stars or 0 }}" min="0">
        </div>
        
        <div class="form-group">
            <label for="language">语言</label>
            <select id="language" name="language">
                <option value="">选择语言</option>
                {% for lang in languages %}
                <option value="{{ lang }}" {% if project.language == lang %}selected{% endif %}>{{ lang }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author" value="{{ project.author or '' }}">
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary"><svg style="width:14px;height:14px;display:inline-block;vertical-align:middle;"><use href="#icon-floppy"/></svg> 保存</button>
            <a href="/admin/projects" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
